<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MatchPilot</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex justify-center items-start py-10">
  <div class="bg-white shadow-xl rounded-xl max-w-xl w-full p-6 space-y-6">

    <div class="flex justify-between items-center bg-indigo-50 p-4 rounded-lg border border-indigo-100">
      <div id="userInfo" class="text-sm font-medium text-gray-700">
        Status: <span class="text-gray-500">Not logged in</span>
      </div>
      <div id="authButtons" class="flex space-x-2">
        <a href="/.auth/login/github" class="text-xs font-semibold bg-gray-800 text-white px-3 py-2 rounded shadow hover:bg-gray-900 transition">GitHub Login</a>
        <a href="/.auth/login/aad" class="text-xs font-semibold bg-blue-600 text-white px-3 py-2 rounded shadow hover:bg-blue-700 transition">Microsoft Login</a>
      </div>
    </div>

    <h1 class="text-3xl font-bold text-indigo-600 text-center">MatchPilot</h1>

    <div id="loginPrompt" class="text-center py-10 bg-gray-50 rounded-lg border border-dashed border-gray-300">
      <p class="text-gray-600 font-medium">Please log in using GitHub or Microsoft to unlock the AI Resume Analyzer.</p>
    </div>

    <div id="analyzerTool" class="hidden space-y-6">
      <label class="block">
        <span class="text-lg font-medium text-gray-700">Upload Resume (PDF)</span>
        <div id="dropZone"
             class="mt-2 cursor-pointer flex items-center justify-center h-36 border-2 border-dashed border-indigo-300 rounded-xl bg-indigo-50 hover:bg-indigo-100 transition">
          <p id="uploadText" class="text-gray-500">Drag & drop or click to upload</p>
        </div>
        <input type="file" id="resume" accept="application/pdf" class="hidden" />
      </label>

      <div>
        <label class="block text-lg font-medium text-gray-700">Job Description (optional)</label>
        <textarea id="jobDesc"
                  class="mt-1 w-full border border-gray-300 rounded-lg p-3 focus:ring-indigo-500 focus:border-indigo-500 transition"
                  rows="5" placeholder="Paste job description here for a Match Score. Leave blank for Career Advice."></textarea>
      </div>

      <button id="analyzeBtn"
              class="w-full bg-indigo-600 text-white font-semibold py-3 rounded-lg shadow-md hover:bg-indigo-700 transition">
        Analyze
      </button>

      <div id="results" class="space-y-4"></div>
    </div>

  </div>

  <script>
    // --- 1. AUTHENTICATION LOGIC ---
    async function checkAuthStatus() {
      try {
        const response = await fetch('/.auth/me');
        const payload = await response.json();

        if (payload.clientPrincipal) {
          // User IS logged in!
          const userName = payload.clientPrincipal.userDetails;
          
          // Update the header
          document.getElementById('userInfo').innerHTML = `👋 Welcome, <span class="font-bold text-indigo-700">${userName}</span>`;
          document.getElementById('authButtons').innerHTML = `
            <a href="/.auth/logout" class="text-xs font-semibold bg-red-500 text-white px-3 py-2 rounded shadow hover:bg-red-600 transition">Logout</a>
          `;

          // Hide the login prompt and SHOW the analyzer tool
          document.getElementById('loginPrompt').classList.add('hidden');
          document.getElementById('analyzerTool').classList.remove('hidden');
        } else {
          // User is NOT logged in (or we are on localhost)
          document.getElementById('loginPrompt').classList.remove('hidden');
          document.getElementById('analyzerTool').classList.add('hidden');
        }
      } catch (err) {
        console.log("Not logged in or running locally outside Azure SWA.");
        // Ensure prompt shows if fetch fails
        document.getElementById('loginPrompt').classList.remove('hidden');
        document.getElementById('analyzerTool').classList.add('hidden');
      }
    }
    
    // Run auth check immediately on page load
    checkAuthStatus();


    // --- 2. MATCHPILOT LOGIC ---
    const API_URL = "https://matchpilot-api.azurewebsites.net/api/match_resume?code=omb8jB8OQrEVj9DIKbp6ppw0ceACn4_9J6CW4n_U1of-AzFugUTc6w==";
    const resultsDiv = document.getElementById("results");
    const dropZone = document.getElementById("dropZone");
    const resumeInput = document.getElementById("resume");
    const uploadText = document.getElementById("uploadText");

    // Open file dialog on dropZone click
    dropZone.addEventListener("click", () => {
      resumeInput.click();
    });

    // Visual feedback: show selected filename
    resumeInput.addEventListener("change", () => {
      if (resumeInput.files && resumeInput.files.length > 0) {
        uploadText.textContent = resumeInput.files[0].name;
        uploadText.classList.remove("text-gray-500");
        uploadText.classList.add("text-indigo-800", "font-semibold");
      } else {
        uploadText.textContent = "Drag & drop or click to upload";
        uploadText.classList.remove("text-indigo-800", "font-semibold");
        uploadText.classList.add("text-gray-500");
      }
    });

    document.getElementById("analyzeBtn").addEventListener("click", async () => {
      resultsDiv.innerHTML = "";

      if (!resumeInput.files || resumeInput.files.length === 0) {
        resultsDiv.innerHTML = `
          <div class="text-red-500 font-semibold text-center">⚠ Please upload a resume PDF.</div>
        `;
        return;
      }

      const formData = new FormData();
      formData.append("resume", resumeInput.files[0]);
      
      const jobDesc = document.getElementById("jobDesc").value.trim();
      if (jobDesc) {
          formData.append("jd", jobDesc);
      }

      try {
        resultsDiv.innerHTML = `<div class="text-center text-indigo-600 font-semibold animate-pulse">⏳ Analyzing with AI...</div>`;
        const res = await fetch(API_URL, { method: "POST", body: formData });

        if (!res.ok) {
          const text = await res.text();
          resultsDiv.innerHTML = `
            <div class="text-red-600 font-semibold text-center p-4 bg-red-50 rounded">
              ❌ Error: ${res.status} — ${text}
            </div>
          `;
          return;
        }

        const data = await res.json();
        renderResults(data);

      } catch (err) {
        resultsDiv.innerHTML = `
          <div class="text-red-600 font-semibold text-center p-4 bg-red-50 rounded">❌ Network error: ${err.message}</div>
        `;
      }
    });

    function renderResults(data) {
      resultsDiv.innerHTML = "";

      // Recruiter / Match Mode
      if (data.match_score !== undefined) {
        resultsDiv.innerHTML = `
          <div class="bg-white rounded-lg shadow border border-gray-100 p-6 space-y-4 transition">
            <h2 class="text-2xl font-bold text-indigo-600">
              Match Score: <span class="text-indigo-800">${data.match_score}%</span>
            </h2>
            <p class="text-gray-700 font-medium text-lg border-b pb-2">
              Hiring Verdict: <span class="font-bold ${data.hiring_verdict === 'Highly Likely' ? 'text-green-600' : 'text-yellow-600'}">${data.hiring_verdict}</span>
            </p>
            
            <div class="space-y-2">
              <h3 class="font-semibold text-gray-800">Missing Skills:</h3>
              <ul class="list-disc list-inside text-gray-600 marker:text-indigo-400">
                ${data.missing_skills.length > 0 ? data.missing_skills.map(skill => `<li>${skill}</li>`).join("") : '<li>None! Perfect match.</li>'}
              </ul>
            </div>

            <div class="bg-indigo-50 border-l-4 border-indigo-400 p-4 rounded text-gray-700">
              <p class="font-bold text-indigo-900 mb-1">Recruiter Feedback:</p>
              <p class="text-sm">${data.feedback}</p>
            </div>
          </div>
        `;
      }
      // Coach / Navigator Mode
      else if (data.profile_score !== undefined) {
        resultsDiv.innerHTML = `
          <div class="bg-white rounded-lg shadow border border-gray-100 p-6 space-y-4 transition">
            <h2 class="text-2xl font-bold text-indigo-600">
              Profile Strength: <span class="text-indigo-800">${data.profile_score}%</span>
            </h2>

            <div class="space-y-2">
              <h3 class="font-semibold text-gray-800">Recommended Roles:</h3>
              <div class="flex flex-wrap gap-2 mt-2">
                ${data.recommended_roles.map(role => `<span class="bg-blue-100 text-blue-800 text-xs font-semibold px-2.5 py-0.5 rounded">${role}</span>`).join("")}
              </div>
            </div>

            <div class="space-y-2 mt-4">
              <h3 class="font-semibold text-gray-800">Top Skills Identified:</h3>
              <ul class="list-disc list-inside text-gray-600 marker:text-indigo-400">
                ${data.top_skills.map(skill => `<li>${skill}</li>`).join("")}
              </ul>
            </div>

            <div class="bg-indigo-50 border-l-4 border-indigo-400 p-4 rounded text-gray-700 mt-4">
              <p class="font-bold text-indigo-900 mb-1">Improvement Tip:</p>
              <p class="text-sm">${data.improvement_tips}</p>
            </div>
          </div>
        `;
      }
      // Unknown response
      else {
        resultsDiv.innerHTML = `
          <div class="text-center text-red-600 p-4 bg-red-50 rounded">⚠ Unexpected response format from AI.</div>
        `;
      }
    }
  </script>
</body>
</html>
